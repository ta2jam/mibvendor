name: Parser public corpus

run-name: Parser public corpus · ${{ github.sha }}

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reproduce:
    name: Reproduce (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-amd64
            runner: ubuntu-24.04
            machine: x86_64
          - label: linux-arm64
            runner: ubuntu-24.04-arm
            machine: aarch64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify native runner and Docker architecture
        shell: bash
        run: |
          set -euo pipefail
          test "$(uname -s)" = Linux
          test "$(uname -m)" = "${{ matrix.machine }}"
          test "$(docker info --format '{{.Architecture}}')" = "${{ matrix.machine }}"

      - name: Run pinned parsers against the public breadth corpus
        run: experiments/parser-bakeoff/scripts/run_public_containers.sh "$RUNNER_TEMP/${{ matrix.label }}"

      - name: Upload architecture evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: parser-public-${{ matrix.label }}-${{ github.run_id }}
          path: ${{ runner.temp }}/${{ matrix.label }}/*.json
          if-no-files-found: error
          retention-days: 14

  compare:
    name: Validate cross-architecture parity
    needs: reproduce
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download amd64 evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: parser-public-linux-amd64-${{ github.run_id }}
          path: ${{ runner.temp }}/linux-amd64

      - name: Download arm64 evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: parser-public-linux-arm64-${{ github.run_id }}
          path: ${{ runner.temp }}/linux-arm64

      - name: Validate complete native evidence and parity
        shell: bash
        run: |
          set -euo pipefail
          python3 experiments/parser-bakeoff/scripts/validate_public_multiarch_results.py \
            --expected-source-commit "$GITHUB_SHA" \
            "$RUNNER_TEMP/linux-amd64" \
            "$RUNNER_TEMP/linux-arm64" \
            | tee "$RUNNER_TEMP/public-parser-validation.json"

      - name: Upload parity decision input
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: parser-public-parity-${{ github.run_id }}
          path: ${{ runner.temp }}/public-parser-validation.json
          if-no-files-found: error
          retention-days: 14
