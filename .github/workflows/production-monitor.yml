name: Production Monitor

on:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-monitor
  cancel-in-progress: true

jobs:
  verify-production:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: Verify public origin and governed release
        env:
          ORIGIN: https://mibvendor.io
          EXPECTED_COMMIT: ${{ github.sha }}
          EXPECTED_DATA_RELEASE: alpha-intelligence-2026-07-14.1
        run: |
          EXPECTED_VERSION=$(tr -d '\n' < VERSION)
          export EXPECTED_VERSION
          ./scripts/verify-production.sh
